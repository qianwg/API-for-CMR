<!DOCTYPE html>
<html>

<head>
    <title>疾病风险预测</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
        <!-- 头部图片 -->
        <div class="header-image">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="模型分析" style="width:100%; height: auto;">
        </div>
    <h1>输入健康数据</h1>
    <form method="POST">
        <div class="form-group">
            <label>Age (year):</label>
            <input type="number" step="1" name="age" required>
        </div>

        <div class="form-group">
            <label>Sex:</label>
            <select name="sex">
                <option value="Female">女性</option>
                <option value="Male">男性</option>
            </select>
        </div>

        <div class="form-group">
            <label>Basal metabolic rate (KJ):</label>
            <input type="number" step="0.1" name="bmr" required>
        </div>

        <div class="form-group">
            <label>Height (cm):</label>
            <input type="number" step="0.1" name="height" required>
        </div>

        <div class="form-group">
            <label>Testosterone (nmol/L):</label>
            <input type="number" step="0.001" name="testosterone" required>
        </div>
        
        <div class="form-group">
            <label>Weight (kg):</label>
            <input type="number" step="0.1" name="weight" required>
        </div>

        <div class="form-group">
            <label>Waist circumference (cm):</label>
            <input type="number" step="0.1" name="waist" required>
        </div>

        <div class="form-group">
            <label>FVC (L):</label>
            <input type="number" step="0.01" name="fvc" required>
        </div>

        <div class="form-group">
            <label>FEV1 (L):</label>
            <input type="number" step="0.01" name="fev1" required>
        </div>

        <div class="form-group">
            <label>Creatinine (μmoI/L):</label>
            <input type="number" step="0.1" name="creatinine" required>
        </div>

        <div class="form-group">
            <label>Urate (μmol/L):</label>
            <input type="number" step="0.1" name="urate" required>
        </div>


        <!-- 其他字段（Weight、Waist_circumference等）类似添加 -->

        <button type="submit">预测</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>Predicted result</h2>
        <!-- <p>您的未来是健康预测概率为: {{ result.prob_class0 }}</p> -->
        <p>The predicted probability for unhealth risk is: {{ result.prob_class1 }}</p>
        <p>Deepseek advice: {{ final_response }}</p>
    </div>
    {% endif %}
</body>

</html>
